<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" font-family="Inter, sans-serif">
  <rect width="1200" height="260" fill="#FFFFFF"/>

  <!-- Flow boxes -->
  <rect x="30" y="40" width="100" height="44" rx="8" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
  <text x="80" y="67" text-anchor="middle" fill="#1D2330" font-size="12" font-weight="600">Idea</text>

  <polygon points="140,57 150,62 140,67" fill="#E5E7EB"/>

  <rect x="160" y="40" width="100" height="44" rx="8" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
  <text x="210" y="67" text-anchor="middle" fill="#1D2330" font-size="12" font-weight="600">Spec</text>

  <polygon points="270,57 280,62 270,67" fill="#E5E7EB"/>

  <rect x="290" y="40" width="100" height="44" rx="8" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
  <text x="340" y="67" text-anchor="middle" fill="#1D2330" font-size="12" font-weight="600">Build</text>

  <polygon points="400,57 410,62 400,67" fill="#E5E7EB"/>

  <rect x="420" y="40" width="100" height="44" rx="8" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
  <text x="470" y="67" text-anchor="middle" fill="#1D2330" font-size="12" font-weight="600">Review</text>

  <polygon points="530,57 540,62 530,67" fill="#E5E7EB"/>

  <rect x="550" y="40" width="100" height="44" rx="8" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
  <text x="600" y="67" text-anchor="middle" fill="#1D2330" font-size="12" font-weight="600">Deploy</text>

  <polygon points="660,57 670,62 660,67" fill="#22C55E"/>

  <rect x="680" y="40" width="100" height="44" rx="8" fill="rgba(34,197,94,0.06)" stroke="#22C55E" stroke-width="1.5"/>
  <text x="730" y="67" text-anchor="middle" fill="#22C55E" font-size="12" font-weight="600">Value</text>

  <!-- Friction indicators (just colored dots with lines) -->
  <line x1="210" y1="84" x2="210" y2="120" stroke="#EE5B2B" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="210" cy="130" r="14" fill="rgba(238,91,43,0.08)" stroke="rgba(238,91,43,0.2)" stroke-width="1"/>
  <text x="210" y="135" text-anchor="middle" fill="#EE5B2B" font-size="12" font-weight="700">1</text>

  <line x1="340" y1="84" x2="340" y2="150" stroke="#EE5B2B" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="340" cy="160" r="14" fill="rgba(238,91,43,0.08)" stroke="rgba(238,91,43,0.2)" stroke-width="1"/>
  <text x="340" y="165" text-anchor="middle" fill="#EE5B2B" font-size="12" font-weight="700">2</text>

  <line x1="470" y1="84" x2="470" y2="120" stroke="#EE5B2B" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="470" cy="130" r="14" fill="rgba(238,91,43,0.08)" stroke="rgba(238,91,43,0.2)" stroke-width="1"/>
  <text x="470" y="135" text-anchor="middle" fill="#EE5B2B" font-size="12" font-weight="700">3</text>

  <line x1="600" y1="84" x2="600" y2="150" stroke="#EE5B2B" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="600" cy="160" r="14" fill="rgba(238,91,43,0.08)" stroke="rgba(238,91,43,0.2)" stroke-width="1"/>
  <text x="600" y="165" text-anchor="middle" fill="#EE5B2B" font-size="12" font-weight="700">4</text>

  <!-- Right side: summary -->
  <g transform="translate(830, 40)">
    <rect width="330" height="170" rx="14" fill="#F6F7F8"/>
    <text x="165" y="40" text-anchor="middle" fill="#1D2330" font-size="16" font-weight="700">We find the friction.</text>
    <text x="165" y="65" text-anchor="middle" fill="#1D2330" font-size="16" font-weight="700">We fix it.</text>
    <rect x="90" y="100" width="150" height="36" rx="18" fill="#EE5B2B"/>
    <text x="165" y="123" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Run an X-Ray</text>
  </g>
</svg>
