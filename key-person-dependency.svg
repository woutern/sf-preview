<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" font-family="Inter, sans-serif">
  <rect width="1200" height="320" fill="#FFFFFF"/>

  <!-- Bars -->
  <g transform="translate(80, 40)">
    <circle cx="8" cy="8" r="8" fill="#EE5B2B"/>
    <rect x="60" y="0" width="500" height="16" rx="4" fill="#EE5B2B"/>
    <text x="570" y="13" fill="#EE5B2B" font-size="14" font-weight="700">58%</text>

    <circle cx="8" cy="44" r="8" fill="rgba(238,91,43,0.5)"/>
    <rect x="60" y="36" width="120" height="16" rx="4" fill="rgba(238,91,43,0.5)"/>
    <text x="190" y="49" fill="#EE5B2B" font-size="13" font-weight="600">14%</text>

    <circle cx="8" cy="80" r="8" fill="rgba(103,111,126,0.3)"/>
    <rect x="60" y="72" width="86" height="16" rx="4" fill="rgba(103,111,126,0.3)"/>
    <text x="156" y="85" fill="#676F7E" font-size="13">10%</text>

    <circle cx="8" cy="116" r="8" fill="rgba(103,111,126,0.2)"/>
    <rect x="60" y="108" width="70" height="16" rx="4" fill="rgba(103,111,126,0.2)"/>
    <text x="140" y="121" fill="#676F7E" font-size="13">8%</text>

    <circle cx="8" cy="152" r="8" fill="rgba(103,111,126,0.1)"/>
    <rect x="60" y="144" width="86" height="16" rx="4" fill="rgba(103,111,126,0.1)"/>
    <text x="156" y="157" fill="#676F7E" font-size="13">10%</text>
  </g>

  <!-- Bus Factor callout -->
  <g transform="translate(780, 40)">
    <rect width="340" height="130" rx="14" fill="#F6F7F8"/>
    <text x="30" y="30" fill="#EE5B2B" font-size="10" font-weight="600" letter-spacing="0.1em">BUS FACTOR</text>
    <text x="30" y="80" fill="#1D2330" font-size="60" font-weight="800">1</text>
    <text x="100" y="65" fill="#676F7E" font-size="13">Critical systems</text>
    <text x="100" y="85" fill="#676F7E" font-size="13">single contributor</text>
  </g>

  <!-- Bottom bar -->
  <g transform="translate(80, 250)">
    <rect width="1040" height="48" rx="10" fill="#1D2330"/>
    <text x="30" y="30" fill="#FFFFFF" font-size="14" font-weight="600">Found in 72% of assessments</text>
    <rect x="880" y="10" width="130" height="28" rx="14" fill="#EE5B2B"/>
    <text x="945" y="29" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">Run an X-Ray</text>
  </g>
</svg>
