<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Inter, sans-serif">
  <rect width="1200" height="480" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#676F7E" font-size="11" font-weight="600" letter-spacing="0.15em">X-RAY FINDING — MOST COMMON PATTERN</text>
  <text x="600" y="62" text-anchor="middle" fill="#1D2330" font-size="22" font-weight="700">Key-Person Dependency</text>

  <!-- Stat callout -->
  <rect x="440" y="80" width="320" height="50" rx="25" fill="rgba(238, 91, 43, 0.08)"/>
  <text x="600" y="111" text-anchor="middle" fill="#EE5B2B" font-size="16" font-weight="600">Found in 72% of X-Ray assessments</text>

  <!-- Visual: commit distribution bars -->
  <g transform="translate(80, 160)">
    <text x="0" y="0" fill="#1D2330" font-size="14" font-weight="600">Commit distribution — typical finding</text>
    <text x="0" y="20" fill="#676F7E" font-size="12">Who wrote the code in the last 12 months?</text>

    <!-- Developer 1 — dominant -->
    <rect x="0" y="42" width="16" height="16" rx="8" fill="#EE5B2B"/>
    <text x="26" y="55" fill="#1D2330" font-size="13" font-weight="500">Developer A</text>
    <rect x="180" y="40" width="580" height="20" rx="4" fill="#EE5B2B"/>
    <text x="770" y="55" fill="#EE5B2B" font-size="13" font-weight="700">58%</text>

    <!-- Developer 2 — secondary -->
    <rect x="0" y="76" width="16" height="16" rx="8" fill="rgba(238, 91, 43, 0.5)"/>
    <text x="26" y="89" fill="#1D2330" font-size="13" font-weight="500">Developer B</text>
    <rect x="180" y="74" width="140" height="20" rx="4" fill="rgba(238, 91, 43, 0.5)"/>
    <text x="330" y="89" fill="#EE5B2B" font-size="13" font-weight="600">14%</text>

    <!-- Developer 3 -->
    <rect x="0" y="110" width="16" height="16" rx="8" fill="rgba(103, 111, 126, 0.3)"/>
    <text x="26" y="123" fill="#1D2330" font-size="13" font-weight="500">Developer C</text>
    <rect x="180" y="108" width="100" height="20" rx="4" fill="rgba(103, 111, 126, 0.3)"/>
    <text x="290" y="123" fill="#676F7E" font-size="13">10%</text>

    <!-- Developer 4 -->
    <rect x="0" y="144" width="16" height="16" rx="8" fill="rgba(103, 111, 126, 0.2)"/>
    <text x="26" y="157" fill="#1D2330" font-size="13" font-weight="500">Developer D</text>
    <rect x="180" y="142" width="80" height="20" rx="4" fill="rgba(103, 111, 126, 0.2)"/>
    <text x="270" y="157" fill="#676F7E" font-size="13">8%</text>

    <!-- Others -->
    <rect x="0" y="178" width="16" height="16" rx="8" fill="rgba(103, 111, 126, 0.1)"/>
    <text x="26" y="191" fill="#676F7E" font-size="13">6 other contributors</text>
    <rect x="180" y="176" width="100" height="20" rx="4" fill="rgba(103, 111, 126, 0.1)"/>
    <text x="290" y="191" fill="#676F7E" font-size="13">10%</text>

    <!-- Bus factor callout -->
    <rect x="620" y="60" width="380" height="140" rx="12" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
    <text x="640" y="92" fill="#EE5B2B" font-size="11" font-weight="600" letter-spacing="0.1em">BUS FACTOR</text>
    <text x="640" y="130" fill="#1D2330" font-size="48" font-weight="800">1</text>
    <text x="700" y="115" fill="#676F7E" font-size="13">
      <tspan x="700" dy="0">Critical systems maintained</tspan>
      <tspan x="700" dy="18">by a single contributor.</tspan>
      <tspan x="700" dy="18">If they leave, progress stalls.</tspan>
    </text>
  </g>

  <!-- Bottom: what to do -->
  <g transform="translate(80, 400)">
    <rect width="1040" height="60" rx="10" fill="#F6F7F8"/>
    <text x="30" y="25" fill="#1D2330" font-size="14" font-weight="600">Verdict: Investable with conditions</text>
    <text x="30" y="45" fill="#676F7E" font-size="12">Pre-close: cross-training plan, architecture documentation, hiring for redundancy on critical systems.</text>
    <rect x="880" y="15" width="130" height="32" rx="16" fill="#EE5B2B"/>
    <text x="945" y="36" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">Run an X-Ray</text>
  </g>
</svg>
