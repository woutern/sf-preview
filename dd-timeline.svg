<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" font-family="Inter, sans-serif">
  <rect width="1200" height="220" fill="#1D2330"/>

  <!-- Timeline line -->
  <line x1="100" y1="80" x2="1100" y2="80" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <line x1="100" y1="80" x2="1100" y2="80" stroke="#EE5B2B" stroke-width="3" opacity="0.3"/>

  <!-- Step 1 -->
  <circle cx="150" cy="80" r="16" fill="#EE5B2B"/>
  <text x="150" y="85" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
  <text x="150" y="120" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">X-Ray</text>
  <text x="150" y="140" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">Day 1</text>

  <!-- Step 2 -->
  <circle cx="450" cy="80" r="16" fill="rgba(238,91,43,0.5)"/>
  <text x="450" y="85" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
  <text x="450" y="120" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">Deep Dive</text>
  <text x="450" y="140" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">Week 1</text>

  <!-- Step 3 -->
  <circle cx="750" cy="80" r="16" fill="rgba(238,91,43,0.3)"/>
  <text x="750" y="85" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
  <text x="750" y="120" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">Analysis</text>
  <text x="750" y="140" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">Week 1-2</text>

  <!-- Step 4 -->
  <circle cx="1050" cy="80" r="16" fill="rgba(238,91,43,0.15)"/>
  <text x="1050" y="85" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
  <text x="1050" y="120" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">IC Report</text>
  <text x="1050" y="140" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">Week 2</text>

  <!-- Bottom comparison -->
  <rect x="60" y="170" width="500" height="30" rx="6" fill="rgba(238,91,43,0.08)"/>
  <text x="310" y="190" text-anchor="middle" fill="#EE5B2B" font-size="11" font-weight="600">Scaleflow: 1-2 weeks</text>
  <rect x="640" y="170" width="500" height="30" rx="6" fill="rgba(255,255,255,0.03)"/>
  <text x="890" y="190" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="11">Traditional: 3-6 weeks</text>
</svg>
