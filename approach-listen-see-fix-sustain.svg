<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" font-family="Inter, sans-serif">
  <rect width="1200" height="200" fill="#FFFFFF"/>

  <!-- Connecting line -->
  <line x1="160" y1="60" x2="1040" y2="60" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Step 1 -->
  <circle cx="160" cy="60" r="30" fill="#F6F7F8" stroke="#EE5B2B" stroke-width="2"/>
  <text x="160" y="67" text-anchor="middle" fill="#EE5B2B" font-size="14" font-weight="700">01</text>
  <text x="160" y="115" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Listen</text>

  <!-- Step 2 -->
  <circle cx="453" cy="60" r="30" fill="#F6F7F8" stroke="#EE5B2B" stroke-width="2"/>
  <text x="453" y="67" text-anchor="middle" fill="#EE5B2B" font-size="14" font-weight="700">02</text>
  <text x="453" y="115" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">See</text>

  <!-- Step 3 -->
  <circle cx="747" cy="60" r="30" fill="#F6F7F8" stroke="#EE5B2B" stroke-width="2"/>
  <text x="747" y="67" text-anchor="middle" fill="#EE5B2B" font-size="14" font-weight="700">03</text>
  <text x="747" y="115" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Fix</text>

  <!-- Step 4 -->
  <circle cx="1040" cy="60" r="30" fill="#1D2330" stroke="#1D2330" stroke-width="2"/>
  <text x="1040" y="67" text-anchor="middle" fill="#EE5B2B" font-size="14" font-weight="700">04</text>
  <text x="1040" y="115" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Sustain</text>
</svg>
