<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" font-family="Inter, sans-serif">
  <rect width="1200" height="280" fill="#FFFFFF"/>

  <!-- Step 1: Connect -->
  <g transform="translate(60, 30)">
    <circle cx="100" cy="70" r="50" fill="rgba(238, 91, 43, 0.08)"/>
    <rect x="80" y="52" width="40" height="36" rx="4" fill="none" stroke="#EE5B2B" stroke-width="2.5"/>
    <circle cx="100" cy="70" r="6" fill="#EE5B2B"/>
    <text x="100" y="150" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Connect</text>
    <text x="100" y="174" text-anchor="middle" fill="#676F7E" font-size="13">5 min setup</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(245, 95)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#E5E7EB" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="55,-5 65,0 55,5" fill="#E5E7EB"/>
  </g>

  <!-- Step 2: Analyze -->
  <g transform="translate(340, 30)">
    <circle cx="100" cy="70" r="50" fill="rgba(238, 91, 43, 0.08)"/>
    <rect x="78" y="50" width="44" height="6" rx="3" fill="#EE5B2B"/>
    <rect x="78" y="62" width="36" height="6" rx="3" fill="#EE5B2B" opacity="0.7"/>
    <rect x="78" y="74" width="28" height="6" rx="3" fill="#EE5B2B" opacity="0.4"/>
    <rect x="78" y="86" width="20" height="6" rx="3" fill="#EE5B2B" opacity="0.2"/>
    <text x="100" y="150" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Analyze</text>
    <text x="100" y="174" text-anchor="middle" fill="#676F7E" font-size="13">200+ benchmarks</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(525, 95)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#E5E7EB" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="55,-5 65,0 55,5" fill="#E5E7EB"/>
  </g>

  <!-- Step 3: Review -->
  <g transform="translate(620, 30)">
    <circle cx="100" cy="70" r="50" fill="rgba(238, 91, 43, 0.08)"/>
    <circle cx="100" cy="62" r="12" fill="none" stroke="#EE5B2B" stroke-width="2.5"/>
    <path d="M88 82 C88 74, 112 74, 112 82" fill="none" stroke="#EE5B2B" stroke-width="2.5"/>
    <text x="100" y="150" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Review</text>
    <text x="100" y="174" text-anchor="middle" fill="#676F7E" font-size="13">Operator validated</text>
  </g>

  <!-- Arrow 3 -->
  <g transform="translate(805, 95)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#EE5B2B" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="55,-5 65,0 55,5" fill="#EE5B2B"/>
  </g>

  <!-- Step 4: Report (highlighted) -->
  <g transform="translate(900, 30)">
    <circle cx="100" cy="70" r="50" fill="#1D2330"/>
    <rect x="82" y="50" width="36" height="42" rx="4" fill="none" stroke="#EE5B2B" stroke-width="2.5"/>
    <polyline points="82,58 100,58 100,50" fill="none" stroke="#EE5B2B" stroke-width="2"/>
    <line x1="90" y1="68" x2="110" y2="68" stroke="#EE5B2B" stroke-width="1.5"/>
    <line x1="90" y1="76" x2="106" y2="76" stroke="#EE5B2B" stroke-width="1.5"/>
    <line x1="90" y1="84" x2="102" y2="84" stroke="#EE5B2B" stroke-width="1.5"/>
    <text x="100" y="150" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Report</text>
    <text x="100" y="174" text-anchor="middle" fill="#676F7E" font-size="13">1 business day</text>
  </g>

  <!-- Bottom labels -->
  <rect x="60" y="220" width="240" height="40" rx="20" fill="#F6F7F8"/>
  <text x="180" y="245" text-anchor="middle" fill="#676F7E" font-size="12">Deal team report</text>
  <rect x="900" y="220" width="240" height="40" rx="20" fill="rgba(238, 91, 43, 0.08)"/>
  <text x="1020" y="245" text-anchor="middle" fill="#EE5B2B" font-size="12">Company report</text>
</svg>
