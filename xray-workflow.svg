<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" font-family="Inter, sans-serif">
  <rect width="1200" height="320" fill="#FFFFFF"/>

  <!-- Step 1: Connect -->
  <g transform="translate(60, 40)">
    <rect width="220" height="240" rx="16" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="110" cy="60" r="28" fill="rgba(238, 91, 43, 0.1)"/>
    <path d="M98 55 L110 48 L122 55 L122 67 L110 74 L98 67Z" fill="none" stroke="#EE5B2B" stroke-width="2"/>
    <circle cx="110" cy="61" r="4" fill="#EE5B2B"/>
    <text x="110" y="116" text-anchor="middle" fill="#EE5B2B" font-size="13" font-weight="600" letter-spacing="0.05em">01</text>
    <text x="110" y="142" text-anchor="middle" fill="#1D2330" font-size="20" font-weight="700">Connect</text>
    <text x="110" y="168" text-anchor="middle" fill="#676F7E" font-size="13">Share repo access.</text>
    <text x="110" y="186" text-anchor="middle" fill="#676F7E" font-size="13">5 minutes total.</text>
    <rect x="55" y="210" width="110" height="28" rx="14" fill="rgba(238, 91, 43, 0.08)"/>
    <text x="110" y="229" text-anchor="middle" fill="#EE5B2B" font-size="12" font-weight="500">5 min setup</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(290, 155)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#E5E7EB" stroke-width="2"/>
    <polygon points="40,-5 50,0 40,5" fill="#E5E7EB"/>
  </g>

  <!-- Step 2: Analyze -->
  <g transform="translate(350, 40)">
    <rect width="220" height="240" rx="16" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="110" cy="60" r="28" fill="rgba(238, 91, 43, 0.1)"/>
    <rect x="94" y="48" width="32" height="26" rx="3" fill="none" stroke="#EE5B2B" stroke-width="2"/>
    <line x1="98" y1="56" x2="118" y2="56" stroke="#EE5B2B" stroke-width="1.5"/>
    <line x1="98" y1="62" x2="114" y2="62" stroke="#EE5B2B" stroke-width="1.5"/>
    <line x1="98" y1="68" x2="110" y2="68" stroke="#EE5B2B" stroke-width="1.5"/>
    <text x="110" y="116" text-anchor="middle" fill="#EE5B2B" font-size="13" font-weight="600" letter-spacing="0.05em">02</text>
    <text x="110" y="142" text-anchor="middle" fill="#1D2330" font-size="20" font-weight="700">Analyze</text>
    <text x="110" y="168" text-anchor="middle" fill="#676F7E" font-size="13">200+ benchmarks.</text>
    <text x="110" y="186" text-anchor="middle" fill="#676F7E" font-size="13">Automated scan.</text>
    <rect x="40" y="210" width="140" height="28" rx="14" fill="rgba(238, 91, 43, 0.08)"/>
    <text x="110" y="229" text-anchor="middle" fill="#EE5B2B" font-size="12" font-weight="500">200+ benchmarks</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(580, 155)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#E5E7EB" stroke-width="2"/>
    <polygon points="40,-5 50,0 40,5" fill="#E5E7EB"/>
  </g>

  <!-- Step 3: Review -->
  <g transform="translate(640, 40)">
    <rect width="220" height="240" rx="16" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="110" cy="60" r="28" fill="rgba(238, 91, 43, 0.1)"/>
    <circle cx="110" cy="58" r="10" fill="none" stroke="#EE5B2B" stroke-width="2"/>
    <path d="M100 72 C100 66, 120 66, 120 72" fill="none" stroke="#EE5B2B" stroke-width="2"/>
    <text x="110" y="116" text-anchor="middle" fill="#EE5B2B" font-size="13" font-weight="600" letter-spacing="0.05em">03</text>
    <text x="110" y="142" text-anchor="middle" fill="#1D2330" font-size="20" font-weight="700">Review</text>
    <text x="110" y="168" text-anchor="middle" fill="#676F7E" font-size="13">Operator validation.</text>
    <text x="110" y="186" text-anchor="middle" fill="#676F7E" font-size="13">Business context added.</text>
    <rect x="35" y="210" width="150" height="28" rx="14" fill="rgba(238, 91, 43, 0.08)"/>
    <text x="110" y="229" text-anchor="middle" fill="#EE5B2B" font-size="12" font-weight="500">Human-in-the-loop</text>
  </g>

  <!-- Arrow 3 -->
  <g transform="translate(870, 155)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#E5E7EB" stroke-width="2"/>
    <polygon points="40,-5 50,0 40,5" fill="#E5E7EB"/>
  </g>

  <!-- Step 4: Report -->
  <g transform="translate(920, 40)">
    <rect width="220" height="240" rx="16" fill="#1D2330" stroke="none"/>
    <circle cx="110" cy="60" r="28" fill="rgba(238, 91, 43, 0.2)"/>
    <rect x="96" y="46" width="28" height="32" rx="3" fill="none" stroke="#EE5B2B" stroke-width="2"/>
    <polyline points="96,52 110,52 110,46" fill="none" stroke="#EE5B2B" stroke-width="2"/>
    <line x1="102" y1="60" x2="118" y2="60" stroke="#EE5B2B" stroke-width="1.5"/>
    <line x1="102" y1="66" x2="115" y2="66" stroke="#EE5B2B" stroke-width="1.5"/>
    <line x1="102" y1="72" x2="112" y2="72" stroke="#EE5B2B" stroke-width="1.5"/>
    <text x="110" y="116" text-anchor="middle" fill="#EE5B2B" font-size="13" font-weight="600" letter-spacing="0.05em">04</text>
    <text x="110" y="142" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="700">Report</text>
    <text x="110" y="168" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="13">Two tailored reports.</text>
    <text x="110" y="186" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="13">Executive + Technical.</text>
    <rect x="40" y="210" width="140" height="28" rx="14" fill="rgba(238, 91, 43, 0.2)"/>
    <text x="110" y="229" text-anchor="middle" fill="#EE5B2B" font-size="12" font-weight="500">24hr delivery</text>
  </g>
</svg>
