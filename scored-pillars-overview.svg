<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="Inter, sans-serif">
  <rect width="1200" height="400" fill="#FFFFFF"/>

  <!-- Title bar -->
  <rect x="40" y="20" width="1120" height="44" rx="8" fill="#1D2330"/>
  <text x="60" y="48" fill="#FFFFFF" font-size="13" font-weight="600">X-RAY BENCHMARK</text>
  <text x="1140" y="48" text-anchor="end" fill="#676F7E" font-size="11">Sample Assessment</text>

  <!-- 6 Pillars as visual gauge cards -->
  <!-- Row 1 -->
  <g transform="translate(40, 82)">
    <rect width="350" height="100" rx="12" fill="#F6F7F8"/>
    <!-- Gauge bar -->
    <rect x="20" y="20" width="310" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="20" y="20" width="270" height="8" rx="4" fill="#22C55E"/>
    <circle cx="290" cy="24" r="10" fill="#22C55E"/>
    <text x="290" y="28" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">A</text>
    <text x="20" y="55" fill="#1D2330" font-size="16" font-weight="700">Delivery Capacity</text>
    <text x="20" y="78" fill="#676F7E" font-size="12">Can the team ship what the roadmap promises?</text>
  </g>

  <g transform="translate(410, 82)">
    <rect width="350" height="100" rx="12" fill="#F6F7F8"/>
    <rect x="20" y="20" width="310" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="20" y="20" width="170" height="8" rx="4" fill="#EE5B2B"/>
    <circle cx="190" cy="24" r="10" fill="#EE5B2B"/>
    <text x="190" y="28" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">C</text>
    <text x="20" y="55" fill="#1D2330" font-size="16" font-weight="700">Continuity &amp; Resilience</text>
    <text x="20" y="78" fill="#676F7E" font-size="12">What happens if someone leaves?</text>
  </g>

  <g transform="translate(780, 82)">
    <rect width="380" height="100" rx="12" fill="#F6F7F8"/>
    <rect x="20" y="20" width="340" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="20" y="20" width="280" height="8" rx="4" fill="#22C55E"/>
    <circle cx="300" cy="24" r="10" fill="#22C55E"/>
    <text x="300" y="28" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">A</text>
    <text x="20" y="55" fill="#1D2330" font-size="16" font-weight="700">IP Depth &amp; Defensibility</text>
    <text x="20" y="78" fill="#676F7E" font-size="12">Is this codebase a moat or a commodity?</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(40, 200)">
    <rect width="350" height="100" rx="12" fill="#F6F7F8"/>
    <rect x="20" y="20" width="310" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="20" y="20" width="250" height="8" rx="4" fill="#22C55E"/>
    <circle cx="270" cy="24" r="10" fill="#22C55E"/>
    <text x="270" y="28" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">B</text>
    <text x="20" y="55" fill="#1D2330" font-size="16" font-weight="700">Trajectory</text>
    <text x="20" y="78" fill="#676F7E" font-size="12">Accelerating or stalling?</text>
  </g>

  <g transform="translate(410, 200)">
    <rect width="350" height="100" rx="12" fill="#F6F7F8"/>
    <rect x="20" y="20" width="310" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="20" y="20" width="140" height="8" rx="4" fill="#EF4444"/>
    <circle cx="160" cy="24" r="10" fill="#EF4444"/>
    <text x="160" y="28" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">D</text>
    <text x="20" y="55" fill="#1D2330" font-size="16" font-weight="700">Risk Exposure</text>
    <text x="20" y="78" fill="#676F7E" font-size="12">What could blow up post-investment?</text>
  </g>

  <g transform="translate(780, 200)">
    <rect width="380" height="100" rx="12" fill="#F6F7F8"/>
    <rect x="20" y="20" width="340" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="20" y="20" width="220" height="8" rx="4" fill="#3B82F6"/>
    <circle cx="240" cy="24" r="10" fill="#3B82F6"/>
    <text x="240" y="28" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">B</text>
    <text x="20" y="55" fill="#1D2330" font-size="16" font-weight="700">AI &amp; Code Quality</text>
    <text x="20" y="78" fill="#676F7E" font-size="12">Practices, testing, automation maturity</text>
  </g>

  <!-- Verdict bar -->
  <g transform="translate(40, 320)">
    <rect width="1120" height="60" rx="12" fill="#1D2330"/>
    <text x="30" y="38" fill="#FFFFFF" font-size="20" font-weight="700">Investable with conditions</text>
    <rect x="880" y="14" width="210" height="32" rx="16" fill="rgba(238, 91, 43, 0.2)"/>
    <text x="985" y="35" text-anchor="middle" fill="#EE5B2B" font-size="13" font-weight="600">3 findings pre-close</text>
  </g>
</svg>
