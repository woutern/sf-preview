<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" font-family="Inter, sans-serif">
  <rect width="1200" height="180" fill="#FFFFFF"/>

  <g transform="translate(40, 20)">
    <rect width="360" height="140" rx="14" fill="#F6F7F8"/>
    <text x="30" y="65" fill="#EE5B2B" font-size="56" font-weight="800">72%</text>
    <text x="30" y="95" fill="#1D2330" font-size="14" font-weight="600">key-person dependency</text>
