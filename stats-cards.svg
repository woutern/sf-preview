<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" font-family="Inter, sans-serif">
  <rect width="1200" height="200" fill="#FFFFFF"/>

  <!-- Stat 1: 72% -->
  <g transform="translate(40, 20)">
    <rect width="360" height="160" rx="14" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
    <text x="30" y="55" fill="#EE5B2B" font-size="52" font-weight="800">72%</text>
    <text x="30" y="85" fill="#1D2330" font-size="14" font-weight="600">of X-Rays reveal key-person</text>
    <text x="30" y="105" fill="#1D2330" font-size="14" font-weight="600">dependency</text>
    <text x="30" y="135" fill="#676F7E" font-size="12">The investor didn't know about it.</text>
  </g>

  <!-- Stat 2: 40% -->
  <g transform="translate(420, 20)">
    <rect width="360" height="160" rx="14" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
    <text x="30" y="55" fill="#EE5B2B" font-size="52" font-weight="800">40%</text>
    <text x="30" y="85" fill="#1D2330" font-size="14" font-weight="600">of companies have critical</text>
    <text x="30" y="105" fill="#1D2330" font-size="14" font-weight="600">security findings</text>
    <text x="30" y="135" fill="#676F7E" font-size="12">That should be addressed pre-close.</text>
  </g>

  <!-- Stat 3: 2.4x -->
  <g transform="translate(800, 20)">
    <rect width="360" height="160" rx="14" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
    <text x="30" y="55" fill="#EE5B2B" font-size="52" font-weight="800">2.4x</text>
    <text x="30" y="85" fill="#1D2330" font-size="14" font-weight="600">cost to fix problems found</text>
    <text x="30" y="105" fill="#1D2330" font-size="14" font-weight="600">post-investment</text>
    <text x="30" y="135" fill="#676F7E" font-size="12">vs. catching them before the deal.</text>
  </g>
</svg>
