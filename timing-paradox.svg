<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" font-family="Inter, sans-serif">
  <rect width="1200" height="280" fill="#FFFFFF"/>

  <!-- Timeline -->
  <rect x="60" y="80" width="1080" height="4" rx="2" fill="#E5E7EB"/>

  <!-- Milestones -->
  <circle cx="160" cy="82" r="6" fill="#E5E7EB"/>
  <text x="160" y="115" text-anchor="middle" fill="#676F7E" font-size="11">First meeting</text>

  <circle cx="420" cy="82" r="6" fill="#E5E7EB"/>
  <text x="420" y="115" text-anchor="middle" fill="#676F7E" font-size="11">Term sheet</text>

  <circle cx="680" cy="82" r="8" fill="#EE5B2B"/>
  <text x="680" y="115" text-anchor="middle" fill="#1D2330" font-size="11" font-weight="700">Valuation locked</text>

  <circle cx="940" cy="82" r="6" fill="#E5E7EB"/>
  <text x="940" y="115" text-anchor="middle" fill="#676F7E" font-size="11">Close</text>

  <!-- Traditional DD bar (late) -->
  <rect x="620" y="145" width="440" height="36" rx="8" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
  <text x="840" y="168" text-anchor="middle" fill="#676F7E" font-size="11">Traditional DD — too late</text>

  <!-- Scaleflow X-Ray bar (early) -->
  <rect x="180" y="200" width="220" height="36" rx="8" fill="rgba(238,91,43,0.06)" stroke="#EE5B2B" stroke-width="1.5"/>
  <text x="290" y="223" text-anchor="middle" fill="#EE5B2B" font-size="11" font-weight="600">X-Ray — before terms</text>
</svg>
