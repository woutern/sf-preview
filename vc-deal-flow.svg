<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="Inter, sans-serif">
  <rect width="1200" height="300" fill="#1D2330"/>

  <!-- Funnel blocks -->
  <g transform="translate(60, 60)">
    <rect width="200" height="100" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="100" y="50" text-anchor="middle" fill="#FFFFFF" font-size="36" font-weight="800">100</text>
    <text x="100" y="78" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="12">sourced</text>
  </g>

  <g transform="translate(280, 76)"><polygon points="0,0 20,8 0,16" fill="rgba(255,255,255,0.1)"/></g>

  <g transform="translate(320, 60)">
    <rect width="200" height="100" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="100" y="50" text-anchor="middle" fill="#FFFFFF" font-size="36" font-weight="800">30</text>
    <text x="100" y="78" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="12">first look</text>
  </g>

  <g transform="translate(540, 76)"><polygon points="0,0 20,8 0,16" fill="#EE5B2B" opacity="0.6"/></g>

  <g transform="translate(580, 60)">
    <rect width="200" height="100" rx="12" fill="rgba(238,91,43,0.08)" stroke="#EE5B2B" stroke-width="1.5"/>
    <text x="100" y="50" text-anchor="middle" fill="#FFFFFF" font-size="36" font-weight="800">15</text>
    <text x="100" y="78" text-anchor="middle" fill="#EE5B2B" font-size="12">x-rayed</text>
  </g>

  <g transform="translate(800, 76)"><polygon points="0,0 20,8 0,16" fill="rgba(255,255,255,0.1)"/></g>

  <g transform="translate(840, 60)">
    <rect width="200" height="100" rx="12" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <text x="100" y="50" text-anchor="middle" fill="#FFFFFF" font-size="36" font-weight="800">5</text>
    <text x="100" y="78" text-anchor="middle" fill="#22C55E" font-size="12">invested</text>
  </g>

  <!-- Bottom comparison -->
  <g transform="translate(60, 200)">
    <rect width="500" height="44" rx="10" fill="rgba(255,255,255,0.03)"/>
    <text x="250" y="28" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="12">Without X-Ray: 3-6 weeks, findings too late</text>
  </g>
  <g transform="translate(620, 200)">
    <rect width="520" height="44" rx="10" fill="rgba(238,91,43,0.06)"/>
    <text x="260" y="28" text-anchor="middle" fill="#EE5B2B" font-size="12" font-weight="600">With X-Ray: 1 business day, before the term sheet</text>
  </g>
</svg>
