<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="Inter, sans-serif">
  <rect width="1200" height="420" fill="#1D2330"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" letter-spacing="0.15em">YOUR DEAL FLOW, DE-RISKED</text>
  <text x="600" y="65" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="700">What if you had a tech read before every term sheet?</text>

  <!-- Deal funnel -->
  <!-- Stage 1: Sourced -->
  <g transform="translate(60, 110)">
    <rect width="200" height="90" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="100" y="30" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-weight="600" letter-spacing="0.1em">SOURCED</text>
    <text x="100" y="58" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="800">100</text>
    <text x="100" y="78" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="12">deals per year</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(268, 150)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <polygon points="30,-4 38,0 30,4" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Stage 2: First Look -->
  <g transform="translate(315, 110)">
    <rect width="200" height="90" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="100" y="30" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-weight="600" letter-spacing="0.1em">FIRST LOOK</text>
    <text x="100" y="58" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="800">30</text>
    <text x="100" y="78" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="12">pass initial screening</text>
  </g>

  <!-- Arrow with X-Ray badge -->
  <g transform="translate(523, 130)">
    <line x1="0" y1="20" x2="30" y2="20" stroke="#EE5B2B" stroke-width="2"/>
    <polygon points="30,16 38,20 30,24" fill="#EE5B2B"/>
    <rect x="-5" y="0" width="50" height="16" rx="8" fill="#EE5B2B"/>
    <text x="20" y="12" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">X-RAY</text>
  </g>

  <!-- Stage 3: X-Rayed (highlighted) -->
  <g transform="translate(570, 110)">
    <rect width="200" height="90" rx="10" fill="rgba(238, 91, 43, 0.08)" stroke="#EE5B2B" stroke-width="1.5"/>
    <text x="100" y="30" text-anchor="middle" fill="#EE5B2B" font-size="10" font-weight="600" letter-spacing="0.1em">X-RAYED</text>
    <text x="100" y="58" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="800">15</text>
    <text x="100" y="78" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="12">tech validated in 24hrs</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(778, 150)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <polygon points="30,-4 38,0 30,4" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Stage 4: Invested -->
  <g transform="translate(817, 110)">
    <rect width="200" height="90" rx="10" fill="rgba(34, 197, 94, 0.06)" stroke="rgba(34, 197, 94, 0.3)" stroke-width="1"/>
    <text x="100" y="30" text-anchor="middle" fill="#22C55E" font-size="10" font-weight="600" letter-spacing="0.1em">INVESTED</text>
    <text x="100" y="58" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="800">5</text>
    <text x="100" y="78" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="12">with full confidence</text>
  </g>

  <!-- Without X-Ray comparison -->
  <g transform="translate(60, 240)">
    <rect width="500" height="70" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="30" y="28" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="600" letter-spacing="0.1em">WITHOUT X-RAY</text>
    <text x="30" y="50" fill="rgba(255,255,255,0.5)" font-size="14">Tech DD happens after the term sheet. Findings arrive too late.</text>
    <text x="470" y="42" text-anchor="end" fill="rgba(239, 68, 68, 0.5)" font-size="12" font-weight="600">3-6 weeks, €25-50K</text>
  </g>

  <g transform="translate(600, 240)">
    <rect width="540" height="70" rx="10" fill="rgba(238, 91, 43, 0.06)" stroke="rgba(238, 91, 43, 0.2)" stroke-width="1"/>
    <text x="30" y="28" fill="#EE5B2B" font-size="10" font-weight="600" letter-spacing="0.1em">WITH SCALEFLOW X-RAY</text>
    <text x="30" y="50" fill="rgba(255,255,255,0.5)" font-size="14">Tech read before the LOI. Filter deals with real data.</text>
    <text x="510" y="42" text-anchor="end" fill="#EE5B2B" font-size="12" font-weight="600">24 hours, from €5K</text>
  </g>

  <!-- Bottom stats -->
  <g transform="translate(60, 345)">
    <rect width="340" height="55" rx="8" fill="rgba(255,255,255,0.03)"/>
    <text x="170" y="24" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11">Only 9% of buyouts include tech DD</text>
    <text x="170" y="42" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="10">even though 31% involve tech companies</text>
  </g>
  <g transform="translate(430, 345)">
    <rect width="340" height="55" rx="8" fill="rgba(255,255,255,0.03)"/>
    <text x="170" y="24" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11">76% of tech acquisitions fail financially</text>
    <text x="170" y="42" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="10">McKinsey Global M&amp;A Report</text>
  </g>
  <g transform="translate(800, 345)">
    <rect width="340" height="55" rx="8" fill="rgba(238, 91, 43, 0.06)"/>
    <text x="170" y="24" text-anchor="middle" fill="#EE5B2B" font-size="11" font-weight="600">2.8x more likely to succeed</text>
    <text x="170" y="42" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="10">when tech DD is done properly</text>
  </g>
</svg>
