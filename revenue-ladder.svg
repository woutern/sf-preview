<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" font-family="Inter, sans-serif">
  <rect width="1200" height="260" fill="#FFFFFF"/>

  <!-- Step 1: X-Ray -->
  <g transform="translate(40, 30)">
    <rect width="200" height="200" rx="12" fill="#F6F7F8"/>
    <rect width="200" height="5" rx="2.5" fill="#EE5B2B"/>
    <text x="100" y="50" text-anchor="middle" fill="#EE5B2B" font-size="11" font-weight="600">ENTRY</text>
    <text x="100" y="80" text-anchor="middle" fill="#1D2330" font-size="20" font-weight="700">X-Ray</text>
    <rect x="40" y="110" width="120" height="32" rx="16" fill="#EE5B2B"/>
    <text x="100" y="131" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">Run an X-Ray</text>
    <text x="100" y="175" text-anchor="middle" fill="#676F7E" font-size="11">1 business day</text>
  </g>

  <g transform="translate(248, 125)"><polygon points="0,0 14,5 0,10" fill="#E5E7EB"/></g>

  <!-- Step 2: DD -->
  <g transform="translate(270, 30)">
    <rect width="200" height="200" rx="12" fill="#F6F7F8"/>
    <rect width="200" height="4" rx="2" fill="#1D2330"/>
    <text x="100" y="50" text-anchor="middle" fill="#676F7E" font-size="11" font-weight="600">VALIDATE</text>
    <text x="100" y="80" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Due Diligence</text>
    <text x="100" y="130" text-anchor="middle" fill="#676F7E" font-size="11">1-2 weeks</text>
  </g>

  <g transform="translate(478, 125)"><polygon points="0,0 14,5 0,10" fill="#E5E7EB"/></g>

  <!-- Step 3: Roadmap -->
  <g transform="translate(500, 30)">
    <rect width="200" height="200" rx="12" fill="#F6F7F8"/>
    <rect width="200" height="4" rx="2" fill="#1D2330"/>
    <text x="100" y="50" text-anchor="middle" fill="#676F7E" font-size="11" font-weight="600">ALIGN</text>
    <text x="100" y="76" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Balanced</text>
    <text x="100" y="98" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Roadmap</text>
    <text x="100" y="130" text-anchor="middle" fill="#676F7E" font-size="11">3 months</text>
  </g>

  <g transform="translate(708, 125)"><polygon points="0,0 14,5 0,10" fill="#E5E7EB"/></g>

  <!-- Step 4: Team Acceleration -->
  <g transform="translate(730, 30)">
    <rect width="200" height="200" rx="12" fill="#F6F7F8"/>
    <rect width="200" height="4" rx="2" fill="#1D2330"/>
    <text x="100" y="50" text-anchor="middle" fill="#676F7E" font-size="11" font-weight="600">EXECUTE</text>
    <text x="100" y="76" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Team</text>
    <text x="100" y="98" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Acceleration</text>
    <text x="100" y="130" text-anchor="middle" fill="#676F7E" font-size="11">3-6 months</text>
  </g>

  <g transform="translate(938, 125)"><polygon points="0,0 14,5 0,10" fill="#E5E7EB"/></g>

  <!-- Step 5: Fractional -->
  <g transform="translate(960, 30)">
    <rect width="200" height="200" rx="12" fill="rgba(238,91,43,0.03)" stroke="#EE5B2B" stroke-width="1.5"/>
    <rect width="200" height="4" rx="2" fill="#EE5B2B"/>
    <text x="100" y="50" text-anchor="middle" fill="#EE5B2B" font-size="11" font-weight="600">SUSTAIN</text>
    <text x="100" y="76" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Fractional</text>
    <text x="100" y="98" text-anchor="middle" fill="#1D2330" font-size="18" font-weight="700">Leadership</text>
    <text x="100" y="130" text-anchor="middle" fill="#676F7E" font-size="11">Ongoing</text>
  </g>
</svg>
