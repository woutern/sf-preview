<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="Inter, sans-serif">
  <rect width="1200" height="300" fill="#FFFFFF"/>

  <!-- 4 portfolio cards with health indicators -->
  <g transform="translate(40, 30)">
    <rect width="250" height="160" rx="12" fill="#F6F7F8"/>
    <rect width="250" height="5" rx="2.5" fill="#22C55E"/>
    <circle cx="220" cy="40" r="14" fill="rgba(34,197,94,0.1)"/>
    <text x="220" y="45" text-anchor="middle" fill="#22C55E" font-size="10" font-weight="700">A</text>
    <text x="20" y="45" fill="#1D2330" font-size="15" font-weight="700">Portfolio Co. A</text>
    <text x="20" y="68" fill="#676F7E" font-size="11">SaaS — CRM</text>
    <rect x="20" y="90" width="180" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="20" y="90" width="160" height="6" rx="3" fill="#22C55E"/>
    <text x="20" y="130" fill="#676F7E" font-size="10">Velocity +34%</text>
  </g>

  <g transform="translate(310, 30)">
    <rect width="250" height="160" rx="12" fill="#F6F7F8"/>
    <rect width="250" height="5" rx="2.5" fill="#EAB308"/>
    <circle cx="220" cy="40" r="14" fill="rgba(234,179,8,0.1)"/>
    <text x="220" y="45" text-anchor="middle" fill="#EAB308" font-size="10" font-weight="700">C</text>
    <text x="20" y="45" fill="#1D2330" font-size="15" font-weight="700">Portfolio Co. B</text>
    <text x="20" y="68" fill="#676F7E" font-size="11">Logistics platform</text>
    <rect x="20" y="90" width="180" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="20" y="90" width="100" height="6" rx="3" fill="#EAB308"/>
    <text x="20" y="130" fill="#676F7E" font-size="10">Key-person risk</text>
  </g>

  <g transform="translate(580, 30)">
    <rect width="250" height="160" rx="12" fill="#F6F7F8"/>
    <rect width="250" height="5" rx="2.5" fill="#EE5B2B"/>
    <circle cx="220" cy="40" r="14" fill="rgba(238,91,43,0.1)"/>
    <text x="220" y="45" text-anchor="middle" fill="#EE5B2B" font-size="10" font-weight="700">D</text>
    <text x="20" y="45" fill="#1D2330" font-size="15" font-weight="700">Portfolio Co. C</text>
    <text x="20" y="68" fill="#676F7E" font-size="11">AI/ML platform</text>
    <rect x="20" y="90" width="180" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="20" y="90" width="60" height="6" rx="3" fill="#EE5B2B"/>
    <text x="20" y="130" fill="#676F7E" font-size="10">2 critical findings</text>
  </g>

  <g transform="translate(850, 30)">
    <rect width="310" height="160" rx="12" fill="rgba(238,91,43,0.03)" stroke="#EE5B2B" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="155" y="70" text-anchor="middle" fill="#EE5B2B" font-size="15" font-weight="600">New Target</text>
    <rect x="80" y="95" width="150" height="36" rx="18" fill="#EE5B2B"/>
    <text x="155" y="118" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Run an X-Ray</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(40, 220)">
    <rect width="1120" height="50" rx="10" fill="#1D2330"/>
    <circle cx="40" cy="25" r="6" fill="#22C55E"/>
    <text x="55" y="30" fill="rgba(255,255,255,0.5)" font-size="11">Healthy</text>
    <circle cx="140" cy="25" r="6" fill="#EAB308"/>
    <text x="155" y="30" fill="rgba(255,255,255,0.5)" font-size="11">Watch</text>
    <circle cx="230" cy="25" r="6" fill="#EE5B2B"/>
    <text x="245" y="30" fill="rgba(255,255,255,0.5)" font-size="11">Action</text>
  </g>
</svg>
