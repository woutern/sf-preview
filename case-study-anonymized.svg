<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="Inter, sans-serif">
  <rect width="1200" height="400" fill="#FFFFFF"/>

  <!-- Left: What the pitch said (clean green checks) -->
  <g transform="translate(60, 30)">
    <text x="0" y="16" fill="#676F7E" font-size="10" font-weight="600" letter-spacing="0.15em">THE PITCH</text>

    <g transform="translate(0, 36)">
      <rect width="480" height="44" rx="8" fill="#F6F7F8"/>
      <circle cx="24" cy="22" r="10" fill="rgba(34,197,94,0.15)"/>
      <text x="24" y="26" text-anchor="middle" fill="#22C55E" font-size="12">&#x2713;</text>
      <text x="46" y="27" fill="#676F7E" font-size="13">Modern stack, ready for 10x</text>
    </g>
    <g transform="translate(0, 90)">
      <rect width="480" height="44" rx="8" fill="#F6F7F8"/>
      <circle cx="24" cy="22" r="10" fill="rgba(34,197,94,0.15)"/>
      <text x="24" y="26" text-anchor="middle" fill="#22C55E" font-size="12">&#x2713;</text>
      <text x="46" y="27" fill="#676F7E" font-size="13">Strong team of 12 engineers</text>
    </g>
    <g transform="translate(0, 144)">
      <rect width="480" height="44" rx="8" fill="#F6F7F8"/>
      <circle cx="24" cy="22" r="10" fill="rgba(34,197,94,0.15)"/>
      <text x="24" y="26" text-anchor="middle" fill="#22C55E" font-size="12">&#x2713;</text>
      <text x="46" y="27" fill="#676F7E" font-size="13">AI model in production</text>
    </g>
    <g transform="translate(0, 198)">
      <rect width="480" height="44" rx="8" fill="#F6F7F8"/>
      <circle cx="24" cy="22" r="10" fill="rgba(34,197,94,0.15)"/>
      <text x="24" y="26" text-anchor="middle" fill="#22C55E" font-size="12">&#x2713;</text>
      <text x="46" y="27" fill="#676F7E" font-size="13">Security is a top priority</text>
    </g>
  </g>

  <!-- Right: What the X-Ray found (warning/red indicators) -->
  <g transform="translate(660, 30)">
    <text x="0" y="16" fill="#EE5B2B" font-size="10" font-weight="600" letter-spacing="0.15em">THE X-RAY</text>

    <g transform="translate(0, 36)">
      <rect width="480" height="44" rx="8" fill="rgba(234,179,8,0.04)" stroke="rgba(234,179,8,0.15)" stroke-width="1"/>
      <circle cx="24" cy="22" r="10" fill="rgba(234,179,8,0.15)"/>
      <text x="24" y="27" text-anchor="middle" fill="#EAB308" font-size="14" font-weight="700">!</text>
      <text x="46" y="27" fill="#1D2330" font-size="13">Breaks at 2x, not 10x</text>
    </g>
    <g transform="translate(0, 90)">
      <rect width="480" height="44" rx="8" fill="rgba(238,91,43,0.04)" stroke="rgba(238,91,43,0.15)" stroke-width="1"/>
      <circle cx="24" cy="22" r="10" fill="rgba(238,91,43,0.15)"/>
      <text x="24" y="27" text-anchor="middle" fill="#EE5B2B" font-size="14" font-weight="700">!</text>
      <text x="46" y="27" fill="#1D2330" font-size="13">2 devs write 72% of code</text>
    </g>
    <g transform="translate(0, 144)">
      <rect width="480" height="44" rx="8" fill="rgba(234,179,8,0.04)" stroke="rgba(234,179,8,0.15)" stroke-width="1"/>
      <circle cx="24" cy="22" r="10" fill="rgba(234,179,8,0.15)"/>
      <text x="24" y="27" text-anchor="middle" fill="#EAB308" font-size="14" font-weight="700">!</text>
      <text x="46" y="27" fill="#1D2330" font-size="13">0% test coverage on AI model</text>
    </g>
    <g transform="translate(0, 198)">
      <rect width="480" height="44" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
      <circle cx="24" cy="22" r="10" fill="rgba(239,68,68,0.15)"/>
      <text x="24" y="27" text-anchor="middle" fill="#EF4444" font-size="14" font-weight="700">!</text>
      <text x="46" y="27" fill="#1D2330" font-size="13">SQL injection in core service</text>
    </g>
  </g>

  <!-- Bottom verdict -->
  <g transform="translate(60, 310)">
    <rect width="1080" height="56" rx="12" fill="#1D2330"/>
    <text x="30" y="36" fill="#FFFFFF" font-size="17" font-weight="700">Investable with conditions</text>
    <rect x="860" y="14" width="190" height="28" rx="14" fill="rgba(238,91,43,0.2)"/>
    <text x="955" y="33" text-anchor="middle" fill="#EE5B2B" font-size="12" font-weight="600">Repriced the deal</text>
  </g>
</svg>
