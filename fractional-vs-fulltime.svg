<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" font-family="Inter, sans-serif">
  <rect width="1200" height="280" fill="#FFFFFF"/>

  <!-- Column 1: Full-time -->
  <g transform="translate(60, 20)">
    <rect width="340" height="240" rx="12" fill="#F6F7F8"/>
    <text x="170" y="35" text-anchor="middle" fill="#676F7E" font-size="13" font-weight="600">Full-time hire</text>
    <line x1="30" y1="48" x2="310" y2="48" stroke="#E5E7EB" stroke-width="1"/>
    <text x="30" y="78" fill="#676F7E" font-size="12">Cost</text><text x="310" y="78" text-anchor="end" fill="#1D2330" font-size="12" font-weight="600">&#x20AC;200K+/year</text>
    <text x="30" y="108" fill="#676F7E" font-size="12">Time to start</text><text x="310" y="108" text-anchor="end" fill="#1D2330" font-size="12" font-weight="600">3-6 months</text>
    <text x="30" y="138" fill="#676F7E" font-size="12">Flexibility</text><text x="310" y="138" text-anchor="end" fill="#1D2330" font-size="12" font-weight="600">Low</text>
    <text x="30" y="168" fill="#676F7E" font-size="12">Wrong fit risk</text><text x="310" y="168" text-anchor="end" fill="#EE5B2B" font-size="12" font-weight="600">6-12 months lost</text>
    <text x="30" y="198" fill="#676F7E" font-size="12">Experience</text><text x="310" y="198" text-anchor="end" fill="#1D2330" font-size="12" font-weight="600">1 company</text>
  </g>

  <!-- Column 2: Advisor -->
  <g transform="translate(430, 20)">
    <rect width="340" height="240" rx="12" fill="#F6F7F8"/>
    <text x="170" y="35" text-anchor="middle" fill="#676F7E" font-size="13" font-weight="600">External advisor</text>
    <line x1="30" y1="48" x2="310" y2="48" stroke="#E5E7EB" stroke-width="1"/>
    <text x="30" y="78" fill="#676F7E" font-size="12">Cost</text><text x="310" y="78" text-anchor="end" fill="#1D2330" font-size="12" font-weight="600">&#x20AC;500-2K/day</text>
    <text x="30" y="108" fill="#676F7E" font-size="12">Time to start</text><text x="310" y="108" text-anchor="end" fill="#1D2330" font-size="12" font-weight="600">Immediate</text>
    <text x="30" y="138" fill="#676F7E" font-size="12">Context</text><text x="310" y="138" text-anchor="end" fill="#EE5B2B" font-size="12" font-weight="600">Surface level</text>
    <text x="30" y="168" fill="#676F7E" font-size="12">Accountability</text><text x="310" y="168" text-anchor="end" fill="#EE5B2B" font-size="12" font-weight="600">Advisory only</text>
    <text x="30" y="198" fill="#676F7E" font-size="12">Ownership</text><text x="310" y="198" text-anchor="end" fill="#1D2330" font-size="12" font-weight="600">Recommendations</text>
  </g>

  <!-- Column 3: Scaleflow (highlighted) -->
  <g transform="translate(800, 20)">
    <rect width="340" height="240" rx="12" fill="rgba(238,91,43,0.03)" stroke="#EE5B2B" stroke-width="1.5"/>
    <rect width="340" height="4" rx="2" fill="#EE5B2B"/>
    <text x="170" y="35" text-anchor="middle" fill="#EE5B2B" font-size="13" font-weight="700">Scaleflow Fractional</text>
    <line x1="30" y1="48" x2="310" y2="48" stroke="rgba(238,91,43,0.15)" stroke-width="1"/>
    <text x="30" y="78" fill="#676F7E" font-size="12">Cost</text><text x="310" y="78" text-anchor="end" fill="#1D2330" font-size="12" font-weight="600">&#x20AC;10-15K/mo</text>
    <text x="30" y="108" fill="#676F7E" font-size="12">Time to start</text><text x="310" y="108" text-anchor="end" fill="#22C55E" font-size="12" font-weight="600">1-2 weeks</text>
    <text x="30" y="138" fill="#676F7E" font-size="12">Context</text><text x="310" y="138" text-anchor="end" fill="#22C55E" font-size="12" font-weight="600">Fully embedded</text>
    <text x="30" y="168" fill="#676F7E" font-size="12">Accountability</text><text x="310" y="168" text-anchor="end" fill="#22C55E" font-size="12" font-weight="600">Owns outcomes</text>
    <text x="30" y="198" fill="#676F7E" font-size="12">Experience</text><text x="310" y="198" text-anchor="end" fill="#22C55E" font-size="12" font-weight="600">200+ companies</text>
  </g>
</svg>
