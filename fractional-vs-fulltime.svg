<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" font-family="Inter, sans-serif">
  <rect width="1200" height="380" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#676F7E" font-size="11" font-weight="600" letter-spacing="0.15em">WHY FRACTIONAL</text>
  <text x="600" y="62" text-anchor="middle" fill="#1D2330" font-size="22" font-weight="700">The right model for inflection points</text>

  <!-- Column headers -->
  <g transform="translate(60, 90)">
    <!-- Full-time -->
    <rect x="0" y="0" width="340" height="260" rx="12" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
    <text x="170" y="35" text-anchor="middle" fill="#676F7E" font-size="14" font-weight="600">Full-time hire</text>
    <line x1="30" y1="50" x2="310" y2="50" stroke="#E5E7EB" stroke-width="1"/>

    <text x="30" y="80" fill="#676F7E" font-size="12">Cost</text>
    <text x="310" y="80" text-anchor="end" fill="#1D2330" font-size="13" font-weight="600">€200K+/year</text>

    <text x="30" y="110" fill="#676F7E" font-size="12">Time to hire</text>
    <text x="310" y="110" text-anchor="end" fill="#1D2330" font-size="13" font-weight="600">3-6 months</text>

    <text x="30" y="140" fill="#676F7E" font-size="12">Onboarding</text>
    <text x="310" y="140" text-anchor="end" fill="#1D2330" font-size="13" font-weight="600">3-6 months</text>

    <text x="30" y="170" fill="#676F7E" font-size="12">Risk if wrong fit</text>
    <text x="310" y="170" text-anchor="end" fill="#EE5B2B" font-size="13" font-weight="600">6-12 months lost</text>

    <text x="30" y="200" fill="#676F7E" font-size="12">Flexibility</text>
    <text x="310" y="200" text-anchor="end" fill="#1D2330" font-size="13" font-weight="600">Low</text>

    <text x="30" y="230" fill="#676F7E" font-size="12">Breadth of experience</text>
    <text x="310" y="230" text-anchor="end" fill="#1D2330" font-size="13" font-weight="600">1 company</text>
  </g>

  <!-- Consultant / Advisory -->
  <g transform="translate(430, 90)">
    <rect x="0" y="0" width="340" height="260" rx="12" fill="#F6F7F8" stroke="#E5E7EB" stroke-width="1"/>
    <text x="170" y="35" text-anchor="middle" fill="#676F7E" font-size="14" font-weight="600">External advisor</text>
    <line x1="30" y1="50" x2="310" y2="50" stroke="#E5E7EB" stroke-width="1"/>

    <text x="30" y="80" fill="#676F7E" font-size="12">Cost</text>
    <text x="310" y="80" text-anchor="end" fill="#1D2330" font-size="13" font-weight="600">€500-2K/day</text>

    <text x="30" y="110" fill="#676F7E" font-size="12">Time to start</text>
    <text x="310" y="110" text-anchor="end" fill="#1D2330" font-size="13" font-weight="600">Immediate</text>

    <text x="30" y="140" fill="#676F7E" font-size="12">Context depth</text>
    <text x="310" y="140" text-anchor="end" fill="#EE5B2B" font-size="13" font-weight="600">Surface level</text>

    <text x="30" y="170" fill="#676F7E" font-size="12">Accountability</text>
    <text x="310" y="170" text-anchor="end" fill="#EE5B2B" font-size="13" font-weight="600">Advisory only</text>

    <text x="30" y="200" fill="#676F7E" font-size="12">Team integration</text>
    <text x="310" y="200" text-anchor="end" fill="#EE5B2B" font-size="13" font-weight="600">External</text>

    <text x="30" y="230" fill="#676F7E" font-size="12">Ownership</text>
    <text x="310" y="230" text-anchor="end" fill="#1D2330" font-size="13" font-weight="600">Recommendations</text>
  </g>

  <!-- Scaleflow Fractional (highlighted) -->
  <g transform="translate(800, 90)">
    <rect x="0" y="0" width="340" height="260" rx="12" fill="rgba(238, 91, 43, 0.03)" stroke="#EE5B2B" stroke-width="1.5"/>
    <rect x="0" y="0" width="340" height="4" rx="2" fill="#EE5B2B"/>
    <text x="170" y="35" text-anchor="middle" fill="#EE5B2B" font-size="14" font-weight="700">Scaleflow Fractional</text>
    <line x1="30" y1="50" x2="310" y2="50" stroke="rgba(238, 91, 43, 0.15)" stroke-width="1"/>

    <text x="30" y="80" fill="#676F7E" font-size="12">Cost</text>
    <text x="310" y="80" text-anchor="end" fill="#1D2330" font-size="13" font-weight="600">€10-15K/month</text>

    <text x="30" y="110" fill="#676F7E" font-size="12">Time to start</text>
    <text x="310" y="110" text-anchor="end" fill="#22C55E" font-size="13" font-weight="600">1-2 weeks</text>

    <text x="30" y="140" fill="#676F7E" font-size="12">Context depth</text>
    <text x="310" y="140" text-anchor="end" fill="#22C55E" font-size="13" font-weight="600">Fully embedded</text>

    <text x="30" y="170" fill="#676F7E" font-size="12">Accountability</text>
    <text x="310" y="170" text-anchor="end" fill="#22C55E" font-size="13" font-weight="600">Owns outcomes</text>

    <text x="30" y="200" fill="#676F7E" font-size="12">Flexibility</text>
    <text x="310" y="200" text-anchor="end" fill="#22C55E" font-size="13" font-weight="600">Scale up/down</text>

    <text x="30" y="230" fill="#676F7E" font-size="12">Breadth of experience</text>
    <text x="310" y="230" text-anchor="end" fill="#22C55E" font-size="13" font-weight="600">200+ companies</text>
  </g>
</svg>
