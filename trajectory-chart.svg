<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" font-family="Inter, sans-serif">
  <rect width="1200" height="280" fill="#FFFFFF"/>

  <!-- Chart area -->
  <g transform="translate(80, 30)">
    <!-- Y axis -->
    <line x1="0" y1="0" x2="0" y2="180" stroke="#E5E7EB" stroke-width="1"/>
    <!-- X axis -->
    <line x1="0" y1="180" x2="1040" y2="180" stroke="#E5E7EB" stroke-width="1"/>
    <!-- Grid -->
    <line x1="0" y1="60" x2="1040" y2="60" stroke="#F6F7F8" stroke-width="1"/>
    <line x1="0" y1="120" x2="1040" y2="120" stroke="#F6F7F8" stroke-width="1"/>

    <!-- Velocity curve -->
    <polyline points="0,160 120,155 240,145 360,140 480,130 600,115 720,90 840,55 960,25 1020,10" fill="none" stroke="#EE5B2B" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Area fill -->
    <polygon points="0,160 120,155 240,145 360,140 480,130 600,115 720,90 840,55 960,25 1020,10 1020,180 0,180" fill="rgba(238,91,43,0.05)"/>

    <!-- Key dots -->
    <circle cx="0" cy="160" r="4" fill="#EE5B2B"/>
    <circle cx="480" cy="130" r="4" fill="#EE5B2B"/>
    <circle cx="840" cy="55" r="4" fill="#EE5B2B"/>
    <circle cx="1020" cy="10" r="5" fill="#22C55E"/>

    <!-- Time labels -->
    <text x="0" y="200" fill="#676F7E" font-size="10">2021</text>
    <text x="240" y="200" fill="#676F7E" font-size="10">2022</text>
    <text x="480" y="200" fill="#676F7E" font-size="10">2023</text>
    <text x="720" y="200" fill="#676F7E" font-size="10">2024</text>
    <text x="960" y="200" fill="#676F7E" font-size="10">2025</text>
  </g>

  <!-- Badge -->
  <rect x="960" y="20" width="180" height="28" rx="14" fill="rgba(34,197,94,0.1)"/>
  <text x="1050" y="39" text-anchor="middle" fill="#22C55E" font-size="12" font-weight="600">+88% velocity</text>
</svg>
