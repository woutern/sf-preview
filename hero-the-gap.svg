<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Inter, sans-serif">
  <rect width="1200" height="600" fill="#1D2330"/>

  <!-- Left side: Commercial Ambition -->
  <g transform="translate(0, 0)">
    <rect width="520" height="600" fill="#1D2330"/>
    <text x="260" y="60" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" letter-spacing="0.15em">COMMERCIAL AMBITION</text>

    <!-- Clean, organized blocks representing plans -->
    <g transform="translate(60, 100)">
      <rect width="400" height="50" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="20" y="31" fill="rgba(255,255,255,0.5)" font-size="13">Series B roadmap — 12 features planned</text>
      <rect x="340" y="15" width="40" height="20" rx="10" fill="rgba(34, 197, 94, 0.2)"/>
      <text x="360" y="30" text-anchor="middle" fill="#22C55E" font-size="9" font-weight="600">ON TRACK</text>
    </g>
    <g transform="translate(60, 165)">
      <rect width="400" height="50" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="20" y="31" fill="rgba(255,255,255,0.5)" font-size="13">AI-powered prediction model — launched</text>
      <rect x="340" y="15" width="40" height="20" rx="10" fill="rgba(34, 197, 94, 0.2)"/>
      <text x="360" y="30" text-anchor="middle" fill="#22C55E" font-size="9" font-weight="600">LIVE</text>
    </g>
    <g transform="translate(60, 230)">
      <rect width="400" height="50" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="20" y="31" fill="rgba(255,255,255,0.5)" font-size="13">Team scaling — 6 to 15 engineers</text>
      <rect x="340" y="15" width="40" height="20" rx="10" fill="rgba(34, 197, 94, 0.2)"/>
      <text x="360" y="30" text-anchor="middle" fill="#22C55E" font-size="9" font-weight="600">HIRED</text>
    </g>
    <g transform="translate(60, 295)">
      <rect width="400" height="50" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="20" y="31" fill="rgba(255,255,255,0.5)" font-size="13">Platform scalability — ready for 10x growth</text>
      <rect x="316" y="15" width="64" height="20" rx="10" fill="rgba(34, 197, 94, 0.2)"/>
      <text x="348" y="30" text-anchor="middle" fill="#22C55E" font-size="9" font-weight="600">CONFIRMED</text>
    </g>

    <!-- Summary -->
    <text x="260" y="420" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="48" font-weight="800">The Pitch</text>
    <text x="260" y="460" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="14">What the investor sees</text>
  </g>

  <!-- THE GAP — center -->
  <g transform="translate(520, 0)">
    <rect width="160" height="600" fill="#EE5B2B" opacity="0.08"/>
    <line x1="80" y1="80" x2="80" y2="520" stroke="#EE5B2B" stroke-width="2" stroke-dasharray="8,6" opacity="0.4"/>
    <rect x="20" y="270" width="120" height="60" rx="30" fill="#EE5B2B"/>
    <text x="80" y="296" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700" letter-spacing="0.1em">THE GAP</text>
    <text x="80" y="314" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">What we find</text>
  </g>

  <!-- Right side: Technical Reality -->
  <g transform="translate(680, 0)">
    <rect width="520" height="600" fill="#1D2330"/>
    <text x="260" y="60" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" letter-spacing="0.15em">TECHNICAL REALITY</text>

    <!-- Messy, concerning findings -->
    <g transform="translate(60, 100)">
      <rect width="400" height="50" rx="8" fill="rgba(238, 91, 43, 0.06)" stroke="rgba(238, 91, 43, 0.2)" stroke-width="1"/>
      <text x="20" y="31" fill="rgba(255,255,255,0.5)" font-size="13">72% of code written by single developer</text>
      <rect x="320" y="15" width="60" height="20" rx="10" fill="rgba(238, 91, 43, 0.2)"/>
      <text x="350" y="30" text-anchor="middle" fill="#EE5B2B" font-size="9" font-weight="600">HIGH RISK</text>
    </g>
    <g transform="translate(60, 165)">
      <rect width="400" height="50" rx="8" fill="rgba(238, 91, 43, 0.06)" stroke="rgba(238, 91, 43, 0.2)" stroke-width="1"/>
      <text x="20" y="31" fill="rgba(255,255,255,0.5)" font-size="13">ML pipeline — 0% test coverage, no CI/CD</text>
      <rect x="320" y="15" width="60" height="20" rx="10" fill="rgba(238, 91, 43, 0.2)"/>
      <text x="350" y="30" text-anchor="middle" fill="#EE5B2B" font-size="9" font-weight="600">HIGH RISK</text>
    </g>
    <g transform="translate(60, 230)">
      <rect width="400" height="50" rx="8" fill="rgba(238, 91, 43, 0.06)" stroke="rgba(238, 91, 43, 0.15)" stroke-width="1"/>
      <text x="20" y="31" fill="rgba(255,255,255,0.5)" font-size="13">Potential SQL injection in booking service</text>
      <rect x="320" y="15" width="60" height="20" rx="10" fill="rgba(239, 68, 68, 0.2)"/>
      <text x="350" y="30" text-anchor="middle" fill="#EF4444" font-size="9" font-weight="600">CRITICAL</text>
    </g>
    <g transform="translate(60, 295)">
      <rect width="400" height="50" rx="8" fill="rgba(238, 91, 43, 0.06)" stroke="rgba(238, 91, 43, 0.15)" stroke-width="1"/>
      <text x="20" y="31" fill="rgba(255,255,255,0.5)" font-size="13">12 deprecated packages, EOL framework</text>
      <rect x="302" y="15" width="78" height="20" rx="10" fill="rgba(234, 179, 8, 0.2)"/>
      <text x="341" y="30" text-anchor="middle" fill="#EAB308" font-size="9" font-weight="600">MODERATE</text>
    </g>

    <!-- Summary -->
    <text x="260" y="420" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="48" font-weight="800">The Reality</text>
    <text x="260" y="460" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="14">What the X-Ray reveals</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="576" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">We close the gap between Commercial Ambition and Technical Reality — in 24 hours.</text>
</svg>
