<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" font-family="Inter, sans-serif">
  <!-- Dark gradient background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D2330"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EE5B2B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#EE5B2B" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="700" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="1400" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1400" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1400" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1400" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1400" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="1400" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="700" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="700" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="700" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="700" stroke="#fff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="700" stroke="#fff" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="1200" y2="700" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Left side: Rising clean data (ambition) -->
  <g transform="translate(100, 150)" opacity="0.5">
    <!-- Upward trend line -->
    <polyline points="0,350 80,320 160,280 240,230 320,170 400,100 480,40" fill="none" stroke="#22C55E" stroke-width="2" opacity="0.6"/>
    <!-- Area fill -->
    <polygon points="0,350 80,320 160,280 240,230 320,170 400,100 480,40 480,400 0,400" fill="#22C55E" opacity="0.05"/>
    <!-- Data dots -->
    <circle cx="0" cy="350" r="4" fill="#22C55E" opacity="0.5"/>
    <circle cx="160" cy="280" r="4" fill="#22C55E" opacity="0.6"/>
    <circle cx="320" cy="170" r="4" fill="#22C55E" opacity="0.7"/>
    <circle cx="480" cy="40" r="5" fill="#22C55E" opacity="0.8"/>
  </g>

  <!-- Right side: Chaotic data (reality) -->
  <g transform="translate(820, 150)" opacity="0.5">
    <!-- Jagged line -->
    <polyline points="0,200 60,100 120,250 180,150 240,300 300,120 360,280 420,190 480,350" fill="none" stroke="#EE5B2B" stroke-width="2" opacity="0.6"/>
    <!-- Warning markers -->
    <circle cx="120" cy="250" r="6" fill="#EF4444" opacity="0.5"/>
    <circle cx="240" cy="300" r="8" fill="#EF4444" opacity="0.4"/>
    <circle cx="360" cy="280" r="5" fill="#EF4444" opacity="0.6"/>
    <circle cx="480" cy="350" r="7" fill="#EF4444" opacity="0.4"/>
  </g>

  <!-- Center: The gap glow -->
  <rect x="620" y="0" width="160" height="700" fill="url(#glow)"/>
  <line x1="700" y1="80" x2="700" y2="620" stroke="#EE5B2B" stroke-width="1.5" stroke-dasharray="8,8" opacity="0.3"/>

  <!-- Center orb -->
  <circle cx="700" cy="350" r="80" fill="#EE5B2B" opacity="0.06"/>
  <circle cx="700" cy="350" r="50" fill="#EE5B2B" opacity="0.1"/>
  <circle cx="700" cy="350" r="24" fill="#EE5B2B" opacity="0.9"/>
  <circle cx="700" cy="350" r="12" fill="#fff" opacity="0.3"/>

  <!-- Floating benchmark cards (subtle, like X-Ray output) -->
  <g transform="translate(150, 480)" opacity="0.3">
    <rect width="180" height="50" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="12" y="14" width="60" height="6" rx="3" fill="#22C55E" opacity="0.6"/>
    <rect x="12" y="28" width="100" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
  </g>

  <g transform="translate(380, 520)" opacity="0.2">
    <rect width="160" height="50" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="12" y="14" width="80" height="6" rx="3" fill="#22C55E" opacity="0.6"/>
    <rect x="12" y="28" width="90" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
  </g>

  <g transform="translate(860, 480)" opacity="0.3">
    <rect width="180" height="50" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(238,91,43,0.15)" stroke-width="1"/>
    <rect x="12" y="14" width="40" height="6" rx="3" fill="#EE5B2B" opacity="0.6"/>
    <rect x="12" y="28" width="100" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
  </g>

  <g transform="translate(1080, 520)" opacity="0.2">
    <rect width="160" height="50" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
    <rect x="12" y="14" width="30" height="6" rx="3" fill="#EF4444" opacity="0.6"/>
    <rect x="12" y="28" width="90" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
  </g>

  <!-- Connecting lines from orb to cards (subtle) -->
  <line x1="700" y1="380" x2="240" y2="480" stroke="#EE5B2B" stroke-width="0.5" opacity="0.1"/>
  <line x1="700" y1="380" x2="950" y2="480" stroke="#EE5B2B" stroke-width="0.5" opacity="0.1"/>
</svg>
