<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" font-family="Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D2330"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EE5B2B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#EE5B2B" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EE5B2B" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#EE5B2B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#EE5B2B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="700" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="140" x2="1400" y2="140"/><line x1="0" y1="280" x2="1400" y2="280"/>
    <line x1="0" y1="420" x2="1400" y2="420"/><line x1="0" y1="560" x2="1400" y2="560"/>
    <line x1="280" y1="0" x2="280" y2="700"/><line x1="560" y1="0" x2="560" y2="700"/>
    <line x1="840" y1="0" x2="840" y2="700"/><line x1="1120" y1="0" x2="1120" y2="700"/>
  </g>

  <!-- Left: smooth rising curve -->
  <polyline points="40,550 180,520 320,460 460,370 580,250 660,160" fill="none" stroke="#22C55E" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <polygon points="40,550 180,520 320,460 460,370 580,250 660,160 660,600 40,600" fill="#22C55E" opacity="0.04"/>
  <circle cx="320" cy="460" r="4" fill="#22C55E" opacity="0.6"/>
  <circle cx="580" cy="250" r="5" fill="#22C55E" opacity="0.7"/>
  <circle cx="660" cy="160" r="6" fill="#22C55E" opacity="0.8"/>

  <!-- Center: the gap -->
  <rect x="660" y="0" width="80" height="700" fill="url(#glow)"/>
  <circle cx="700" cy="350" r="120" fill="url(#orb)"/>
  <circle cx="700" cy="350" r="30" fill="#EE5B2B"/>
  <circle cx="700" cy="350" r="14" fill="#fff" opacity="0.25"/>

  <!-- Right: jagged chaotic line -->
  <polyline points="740,200 820,380 880,180 960,420 1040,250 1120,480 1200,300 1300,520 1380,380" fill="none" stroke="#EE5B2B" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <circle cx="960" cy="420" r="8" fill="#EF4444" opacity="0.4"/>
  <circle cx="1120" cy="480" r="10" fill="#EF4444" opacity="0.3"/>
  <circle cx="1300" cy="520" r="7" fill="#EF4444" opacity="0.35"/>

  <!-- Floating particles -->
  <circle cx="200" cy="300" r="2" fill="#22C55E" opacity="0.3"/>
  <circle cx="400" cy="200" r="1.5" fill="#22C55E" opacity="0.2"/>
  <circle cx="500" cy="450" r="2" fill="#22C55E" opacity="0.25"/>
  <circle cx="900" cy="150" r="2" fill="#EE5B2B" opacity="0.2"/>
  <circle cx="1100" cy="300" r="1.5" fill="#EE5B2B" opacity="0.25"/>
  <circle cx="1250" cy="200" r="2" fill="#EE5B2B" opacity="0.15"/>
</svg>
